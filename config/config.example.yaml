# ============================================================
# Price Tracker Configuration
# ============================================================
# Copy this file to config.yaml and fill in your values.
# config.yaml is git-ignored to protect credentials.
# ============================================================

# --- Scraper Settings ---
scraper:
  # Random delay between requests to avoid rate limiting (seconds)
  delay_range: [1, 3]

  # Max retry attempts per failed request
  max_retries: 3

  # HTTP request timeout (seconds)
  timeout: 10

  # Respect robots.txt (recommended: true)
  respect_robots_txt: true

# --- Email Settings ---
email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  use_tls: true

  # For Gmail, use an App Password:
  # https://support.google.com/accounts/answer/185833
  sender_email: "your-email@gmail.com"
  sender_password: "your-app-password"

  # List of recipients for the daily digest
  recipients:
    - "team-lead@company.com"
    - "product-manager@company.com"

  # Subject line prefix
  subject_prefix: "🏷️ Price Alert"

# --- Database Settings ---
database:
  path: "data/prices.db"

# --- Logging ---
logging:
  level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  file: "logs/tracker.log"
  max_bytes: 5242880      # 5 MB
  backup_count: 3         # Keep 3 rotated log files

# --- Products to Track ---
# Each product needs:
#   name:                 Human-readable name
#   url:                  Full product page URL
#   selector:             CSS selector for the price element
#   fallback_selectors:   (optional) Backup CSS selectors if primary fails
#   alert_threshold_pct:  (optional) Min % change to trigger alert (default: 5.0)
#   alert_threshold_abs:  (optional) Min absolute $ change to trigger alert

products:
  - name: "Sony WH-1000XM5 Headphones"
    url: "https://www.example.com/product/sony-wh1000xm5"
    selector: "span.a-price > span.a-offscreen"
    fallback_selectors:
      - "span#priceblock_ourprice"
      - "span.price-large"
    alert_threshold_pct: 5.0

  - name: "Apple iPad Air 2024"
    url: "https://www.example.com/product/ipad-air"
    selector: "div.product-price span.current"
    alert_threshold_pct: 3.0
    alert_threshold_abs: 20.00

  - name: "Samsung 65\" OLED TV"
    url: "https://www.example.com/product/samsung-oled-65"
    selector: "span.price-characteristic"
    alert_threshold_pct: 5.0
